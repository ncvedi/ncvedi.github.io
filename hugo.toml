baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'My Blog'
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
disableXML = true
minifyOutput = true

[params]
env = 'production'
title = 'My Blog'
description = 'Personal blog'
keywords = ['Blog', 'Portfolio', 'Personal']
author = 'Me'
defaultTheme = 'dark'
disableThemeToggle = false

ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = false
tocopen = false

[params.homeInfoParams]
Title = 'Hi there'
Content = "I'm documenting my learning notes in this blog."

[[params.socialIcons]]
name = 'github'
url = 'https://github.com/'

[[params.socialIcons]]
name = 'twitter'
url = 'https://twitter.com/'

[[params.socialIcons]]
name = 'rss'
url = '/index.xml'

[params.assets]
disableHLJS = true
disableFingerprintedCSS = false

[params.label]
text = 'My Blog'
icon = '/favicon.ico'
iconHeight = 35

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
limit = 10
keys = ['title', 'permalink', 'summary', 'content']

[[menu.main]]
identifier = 'posts'
name = 'Posts'
url = '/posts/'
weight = 10

[[menu.main]]
identifier = 'archives'
name = 'Archive'
url = '/archives/'
weight = 20

[[menu.main]]
identifier = 'search'
name = 'Search'
url = '/search/'
weight = 30

[[menu.main]]
identifier = 'tags'
name = 'Tags'
url = '/tags/'
weight = 40

[outputs]
home = ['HTML', 'RSS', 'JSON']
